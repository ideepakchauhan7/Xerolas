<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:;"
    />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Xerolas Result</title>
    <link rel="stylesheet" href="./styles.css" />
    <script type="module" src="./result.ts"></script>
  </head>
  <body class="result-page">
    <main class="result-card result-card--minimal glass-panel">
      <div class="result-backdrop-orb result-backdrop-orb--violet"></div>
      <div class="result-backdrop-orb result-backdrop-orb--blue"></div>

      <section class="result-minimal-shell">
        <div class="result-topbar">
          <nav id="quick-actions" class="result-mini-actions" aria-label="Result modes"></nav>
          <div id="searching-badge" class="result-searching-badge" hidden>Searching...</div>
        </div>
        <section id="ask-question-display" class="result-asked-question" hidden>
          <span class="result-asked-question-label">You asked</span>
          <p id="ask-question-display-text" class="result-asked-question-text"></p>
        </section>
        <div id="grounding-badge" class="result-grounding-badge" hidden>Web search used</div>
        <article id="result-text" class="result-body-copy result-body-copy--minimal"></article>
        <section id="result-sources" class="result-sources" hidden>
          <h2 class="result-sources-title">Sources</h2>
          <ul id="result-sources-list" class="result-sources-list"></ul>
        </section>
        <section id="ask-question-composer" class="result-ask-composer" hidden>
          <label for="ask-question-input" class="result-ask-label">Ask anything</label>
          <textarea
            id="ask-question-input"
            class="result-ask-textarea"
            rows="3"
            placeholder="Type your question here…"
          ></textarea>
          <div class="result-ask-footer">
            <p id="ask-question-helper" class="result-ask-helper">
              Press Enter to send, Shift+Enter for a new line.
            </p>
            <div class="result-ask-actions">
              <button id="ask-question-close" class="result-ask-button result-ask-button--ghost" type="button">
                Close
              </button>
              <button id="ask-question-send" class="result-ask-button result-ask-button--primary" type="button">
                Ask
              </button>
            </div>
          </div>
        </section>
        <button id="result-ask-entry" class="result-ask-entry" type="button" hidden>Ask Anything?</button>
      </section>
    </main>
  </body>
</html>
