<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:;"
    />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Xerolas Capture</title>
    <link rel="stylesheet" href="./styles.css" />
    <script type="module" src="./overlay.ts"></script>
  </head>
  <body class="overlay-page">
    <main id="overlay-root" class="overlay-root" data-state="ready">
      <div class="overlay-toolbar glass-panel">
        <div class="overlay-toolbar-primary">
          <span class="surface-chip overlay-toolbar-badge">
            <span class="result-badge-dot"></span>
            Desktop AI
          </span>
          <span id="overlay-toolbar-status" class="surface-chip overlay-toolbar-status">Ready</span>
        </div>
        <div class="overlay-toolbar-copy">
          <div class="eyebrow">Screen capture</div>
          <p id="overlay-toolbar-text" class="overlay-toolbar-text">
            Drag anywhere on your screen. Xerolas starts analyzing as soon as you release.
          </p>
        </div>
        <div class="overlay-toolbar-actions">
          <span class="surface-chip overlay-toolbar-chip">Esc to cancel</span>
        </div>
      </div>

      <div id="desktop-canvas" class="desktop-canvas"></div>
      <div id="selection-box" class="selection-box" hidden>
        <div id="selection-dimensions" class="selection-dimensions"></div>
      </div>
    </main>
  </body>
</html>
