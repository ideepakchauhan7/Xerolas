<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:;"
    />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Xerolas Settings</title>
    <link rel="stylesheet" href="./styles.css" />
    <script type="module" src="./settings.ts"></script>
  </head>
  <body class="settings-page">
    <main class="settings-shell glass-panel">
      <div class="settings-backdrop-orb settings-backdrop-orb--violet"></div>
      <div class="settings-backdrop-orb settings-backdrop-orb--blue"></div>

      <section class="settings-header settings-header--minimal">
        <div class="settings-header-copy">
          <div class="eyebrow">Xerolas settings</div>
          <h1 class="settings-title">Controls</h1>
        </div>
        <button id="close-settings" class="icon-button settings-close" title="Close settings" aria-label="Close settings">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M6 6l12 12"/><path d="M18 6 6 18"/></svg>
        </button>
      </section>

      <form id="settings-form" class="settings-form settings-form--minimal">
        <label class="settings-card settings-input-card">
          <span class="field-label">Translate target language</span>
          <input
            id="translate-target-language"
            class="text-input"
            type="text"
            placeholder="English"
          />
          <span class="field-helper">Translate uses this language every time.</span>
        </label>

        <label class="settings-card settings-input-card">
          <span class="field-label">Hotkey</span>
          <input
            id="shortcut"
            class="text-input"
            type="text"
            placeholder="CommandOrControl+Shift+Space"
          />
          <span class="field-helper">Press this anywhere to capture the screen.</span>
        </label>

        <div class="settings-actions settings-actions--minimal">
          <button id="save-settings" type="submit" class="pill-button">Save settings</button>
          <span id="settings-status-text" class="settings-actions-note" aria-live="polite"></span>
        </div>
      </form>
    </main>
  </body>
</html>
