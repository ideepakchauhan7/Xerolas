name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-release:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
          - os: windows-latest
          - os: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build app
        run: npm run build

      - name: Build release artifacts
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: "false"
          CONTEXT_AI_BACKEND_URL: https://xerolas.ideepakchauhan7.workers.dev
          CONTEXT_AI_UPDATE_GITHUB_OWNER: ideepakchauhan7
          CONTEXT_AI_UPDATE_GITHUB_REPO: Xerolas-downloads
        run: npx electron-builder --publish never

      - name: Publish assets to public downloads repo
        uses: softprops/action-gh-release@v2
        with:
          repository: ideepakchauhan7/Xerolas-downloads
          token: ${{ secrets.DOWNLOADS_REPO_TOKEN }}
          tag_name: ${{ github.ref_name }}
          files: |
            release/**/*.yml
            release/**/*.exe
            release/**/*.dmg
            release/**/*.AppImage
            release/**/*.deb
          draft: false
          prerelease: false
          append_body: false
          generate_release_notes: true
          fail_on_unmatched_files: false
