name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read
  actions: read

jobs:
  build-release:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            artifact_name: release-ubuntu
          - os: windows-latest
            artifact_name: release-windows
          - os: macos-latest
            artifact_name: release-macos

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build app
        run: npm run build

      - name: Build release artifacts
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: "false"
          CONTEXT_AI_BACKEND_URL: https://xerolas.ideepakchauhan7.workers.dev
          CONTEXT_AI_UPDATE_GITHUB_OWNER: ideepakchauhan7
          CONTEXT_AI_UPDATE_GITHUB_REPO: Xerolas-downloads
        run: npx electron-builder --publish never

      - name: Upload release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          if-no-files-found: error
          path: |
            release/**/*.yml
            release/**/*.exe
            release/**/*.dmg
            release/**/*.AppImage
            release/**/*.deb

  publish-release:
    runs-on: ubuntu-latest
    needs: build-release

    steps:
      - name: Download built artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts
          merge-multiple: true

      - name: Publish assets to public downloads repo
        uses: softprops/action-gh-release@v2
        with:
          repository: ideepakchauhan7/Xerolas-downloads
          token: ${{ secrets.DOWNLOADS_REPO_TOKEN }}
          tag_name: ${{ github.ref_name }}
          target_commitish: main
          files: |
            release-artifacts/**/*.yml
            release-artifacts/**/*.exe
            release-artifacts/**/*.dmg
            release-artifacts/**/*.AppImage
            release-artifacts/**/*.deb
          draft: false
          prerelease: false
          append_body: false
          body: |
            Automated Xerolas desktop release artifacts for source tag `${{ github.ref_name }}`.

            Source repo: `ideepakchauhan7/Xerolas`
            Downloads repo: `ideepakchauhan7/Xerolas-downloads`
          generate_release_notes: false
          fail_on_unmatched_files: false
