name: Publish Landing Page

on:
  push:
    branches:
      - main
    paths:
      - 'landing/**'
      - '.github/workflows/publish-pages.yml'
      - 'README.md'
      - 'xerolas-public-release-guide.md'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  sync-pages:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source repo
        uses: actions/checkout@v4

      - name: Clone public downloads repo
        env:
          DOWNLOADS_REPO_TOKEN: ${{ secrets.DOWNLOADS_REPO_TOKEN }}
        run: |
          git clone https://x-access-token:${DOWNLOADS_REPO_TOKEN}@github.com/ideepakchauhan7/Xerolas-downloads.git downloads-repo

      - name: Sync landing files to docs
        run: |
          mkdir -p downloads-repo/docs
          rm -rf downloads-repo/docs/*
          cp -R landing/. downloads-repo/docs/
          touch downloads-repo/docs/.nojekyll

      - name: Commit and push docs update
        working-directory: downloads-repo
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if git diff --quiet -- docs; then
            echo "No landing page changes to publish."
            exit 0
          fi
          git add docs
          git commit -m "Publish Xerolas landing page"
          git push origin main
